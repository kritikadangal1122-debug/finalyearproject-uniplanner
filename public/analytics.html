<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — UniPlanner</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>window.tailwind={config:{theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)','text-primary':'var(--app-text-primary)','text-secondary':'var(--app-text-secondary)','text-muted':'var(--app-text-muted)','border-subtle':'var(--app-border-subtle)'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <aside id="sidebar" class="sidebar closed"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main id="page-content" class="page-inner"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { initLayout, escHtml, progressBar, showToast } from './js/app.js';
    import { getState, getCurrentRole, getCurrentUser, subscribe } from './js/store.js';
    import { analyticsByRole } from './js/data.js';

    initLayout();
    renderPage();
    subscribe(renderPage);

    function renderPage() {
      const state = getState();
      const role = getCurrentRole();
      const user = getCurrentUser();
      const baseAnalytics = analyticsByRole[role] ?? analyticsByRole.student;

      // Compute real metrics for students
      let analytics = { ...baseAnalytics };
      if (role === 'student' && user) {
        const enrolledClasses = state.classes.filter(c => !c.archived && c.enrolledStudentIds.includes(user.id));
        const enrolledIds = new Set(enrolledClasses.map(c => c.id));
        const myAssignments = state.assignments.filter(a => enrolledIds.has(a.classId));
        const mySubmissions = state.submissions.filter(s => s.studentId === user.id);
        const submittedIds = new Set(mySubmissions.map(s => s.assignmentId));
        const completionRate = myAssignments.length > 0
          ? Math.round((myAssignments.filter(a => submittedIds.has(a.id)).length / myAssignments.length) * 100)
          : 0;
        const gradedSubs = mySubmissions.filter(s => s.score != null);
        const avgGrade = gradedSubs.length > 0
          ? (() => {
              const scores = gradedSubs.map(s => {
                const a = state.assignments.find(x => x.id === s.assignmentId);
                return a ? Math.round((s.score / a.maxPoints) * 100) : null;
              }).filter(v => v != null);
              return scores.length > 0 ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
            })()
          : null;
        analytics = {
          ...baseAnalytics,
          completion: completionRate,
          averageGrade: avgGrade ?? baseAnalytics.averageGrade,
        };
      }

      const pageTitle = role === 'student' ? 'My Grades' : role === 'teacher' ? 'Class Analytics' : 'Platform Analytics';

      const maxHeat = Math.max(...analytics.heatmap, 1);

      document.getElementById('page-content').innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-semibold text-text-primary">${pageTitle}</h1>
          <p class="text-sm text-text-secondary mt-1">Detailed metrics and performance insights</p>
        </div>

        <!-- Key stats -->
        <div class="grid grid-cols-2 gap-4 sm:grid-cols-4 mb-6">
          ${[
            { label: 'Attendance', value: analytics.attendance + '%', color: 'text-emerald-400', icon: 'check_circle', bg: 'bg-emerald-500/20' },
            { label: 'Completion', value: analytics.completion + '%', color: 'text-blue-400', icon: 'task_alt', bg: 'bg-blue-500/20' },
            { label: 'Engagement', value: analytics.engagement + '%', color: 'text-violet-400', icon: 'trending_up', bg: 'bg-violet-500/20' },
            { label: 'Avg Grade', value: analytics.averageGrade + '%', color: 'text-amber-400', icon: 'star', bg: 'bg-amber-500/20' },
          ].map(s => `
            <div class="metric-card">
              <div class="flex items-start justify-between gap-3 mb-3">
                <p class="text-xs uppercase tracking-widest text-text-muted">${s.label}</p>
                <div class="rounded-xl p-2 ${s.bg}">
                  <span class="material-symbols-outlined text-[18px] ${s.color}">${s.icon}</span>
                </div>
              </div>
              <p class="text-3xl font-semibold text-text-primary">${s.value}</p>
              ${progressBar(parseInt(s.value))}
            </div>
          `).join('')}
        </div>

        <div class="grid gap-5 lg:grid-cols-2">
          <!-- Activity heatmap -->
          <div class="metric-card">
            <h2 class="text-base font-semibold text-text-primary mb-1">Activity Heatmap</h2>
            <p class="text-sm text-text-secondary mb-4">Daily engagement over the past 2 weeks</p>
            <div class="flex items-end gap-1.5" style="height:80px">
              ${analytics.heatmap.map((val, i) => {
                const pct = (val / maxHeat) * 100;
                const opacity = 0.2 + (val / maxHeat) * 0.8;
                return `<div class="flex-1 rounded-t-sm transition-all" style="height:${pct}%;background:var(--primary);opacity:${opacity}" title="Day ${i+1}: ${val} activities"></div>`;
              }).join('')}
            </div>
            <div class="mt-2 flex justify-between text-[10px] text-text-muted">
              <span>2 weeks ago</span><span>Today</span>
            </div>
          </div>

          <!-- Weekly progress -->
          <div class="metric-card">
            <h2 class="text-base font-semibold text-text-primary mb-1">Weekly Progress</h2>
            <p class="text-sm text-text-secondary mb-4">Completion rate over the last 7 days</p>
            <div class="space-y-2">
              ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((day, i) => {
                const val = analytics.weeklyProgress[i] ?? 0;
                return `
                  <div class="flex items-center gap-3">
                    <span class="w-8 text-xs text-text-muted shrink-0">${day}</span>
                    <div class="flex-1">${progressBar(val)}</div>
                    <span class="w-8 text-right text-xs font-semibold text-text-secondary shrink-0">${val}%</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>

          <!-- Streak + badges -->
          <div class="metric-card">
            <h2 class="text-base font-semibold text-text-primary mb-4">Streak & Achievements</h2>
            <div class="flex items-center gap-4 mb-5">
              <div class="h-16 w-16 shrink-0 rounded-2xl bg-amber-500/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-4xl text-amber-400">local_fire_department</span>
              </div>
              <div>
                <p class="text-4xl font-bold text-amber-400">${analytics.streak}</p>
                <p class="text-sm text-text-secondary">Day streak</p>
              </div>
            </div>
            ${role === 'student' ? `
              <div>
                <p class="text-xs uppercase tracking-widest text-text-muted mb-3">Badges</p>
                <div class="flex flex-wrap gap-2" id="badges-list"></div>
              </div>
            ` : ''}
          </div>

          <!-- Role-specific insights -->
          ${role === 'student' ? renderStudentInsights(state) : role === 'teacher' ? renderTeacherInsights(state) : renderAdminInsights(state)}
        </div>
      `;

      // Load badges for student
      if (role === 'student') {
        const user = getCurrentUser();
        const badgesList = document.getElementById('badges-list');
        if (badgesList && user?.badges) {
          badgesList.innerHTML = user.badges.map(b => `
            <div class="flex items-center gap-1.5 rounded-full border border-[var(--app-border-subtle)] bg-white/5 px-3 py-1.5">
              <span class="material-symbols-outlined text-[14px] text-amber-400">emoji_events</span>
              <span class="text-xs font-medium text-text-secondary">${escHtml(b)}</span>
            </div>
          `).join('');
        }
      }
    }

    function renderStudentInsights(state) {
      const currentUser = getCurrentUser();
      const enrolledClasses = currentUser
        ? state.classes.filter(c => !c.archived && c.enrolledStudentIds.includes(currentUser.id))
        : [];
      const enrolledIds = new Set(enrolledClasses.map(c => c.id));
      const mySubmissions = currentUser ? state.submissions.filter(s => s.studentId === currentUser.id) : [];
      const submittedIds = new Set(mySubmissions.map(s => s.assignmentId));
      const myAssignments = state.assignments.filter(a => enrolledIds.has(a.classId));
      const pending = myAssignments.filter(a => !submittedIds.has(a.id)).length;
      const graded = mySubmissions.filter(s => s.score != null);

      return `
        <div class="metric-card">
          <h2 class="text-base font-semibold text-text-primary mb-4">My Performance</h2>
          <div class="space-y-3">
            <div class="flex items-center justify-between rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-blue-400 text-[18px]">assignment</span>
                <span class="text-sm text-text-secondary">Pending assignments</span>
              </div>
              <span class="font-bold text-text-primary">${pending}</span>
            </div>
            <div class="flex items-center justify-between rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-emerald-400 text-[18px]">grading</span>
                <span class="text-sm text-text-secondary">Graded submissions</span>
              </div>
              <span class="font-bold text-text-primary">${graded.length}</span>
            </div>
            <div class="flex items-center justify-between rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-amber-400 text-[18px]">school</span>
                <span class="text-sm text-text-secondary">Enrolled courses</span>
              </div>
              <span class="font-bold text-text-primary">${enrolledClasses.length}</span>
            </div>
            ${graded.length > 0 ? `
            <div class="mt-2">
              <p class="text-xs uppercase tracking-widest text-text-muted mb-2">Recent grades</p>
              ${graded.slice(0,3).map(s => {
                const a = state.assignments.find(x => x.id === s.assignmentId);
                const pct = a ? Math.round((s.score / a.maxPoints) * 100) : 0;
                return `<div class="flex items-center justify-between text-sm mb-1">
                  <span class="text-text-secondary truncate mr-2">${escHtml(a?.title ?? 'Assignment')}</span>
                  <span class="font-semibold text-emerald-400 shrink-0">${s.score}/${a?.maxPoints ?? '?'} (${pct}%)</span>
                </div>`;
              }).join('')}
            </div>` : ''}
          </div>
        </div>
      `;
    }

    function renderTeacherInsights(state) {
      const myClasses = state.classes.filter(c => !c.archived);
      const totalStudents = myClasses.reduce((sum, c) => sum + c.enrolledStudentIds.length, 0);
      const pendingSubs = state.submissions.filter(s => s.score == null).length;
      return `
        <div class="metric-card">
          <h2 class="text-base font-semibold text-text-primary mb-4">Class Overview</h2>
          <div class="space-y-3">
            ${myClasses.slice(0, 4).map(c => `
              <div>
                <div class="mb-1 flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <div class="h-2.5 w-2.5 rounded-full shrink-0" style="background:${c.color}"></div>
                    <span class="text-sm text-text-secondary truncate">${escHtml(c.title)}</span>
                  </div>
                  <span class="text-sm font-bold text-text-primary shrink-0">${c.progress}%</span>
                </div>
                ${progressBar(c.progress)}
              </div>
            `).join('')}
            <div class="mt-2 flex justify-between text-sm text-text-muted">
              <span>${totalStudents} total students</span>
              <span class="text-amber-400">${pendingSubs} to grade</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderAdminInsights(state) {
      const roleBreakdown = [
        { label: 'Students', count: state.users.filter(u=>u.role==='student').length, color: 'bg-blue-500' },
        { label: 'Teachers', count: state.users.filter(u=>u.role==='teacher').length, color: 'bg-emerald-500' },
        { label: 'Admins', count: state.users.filter(u=>u.role==='admin').length, color: 'bg-purple-500' },
      ];
      const total = state.users.length;
      return `
        <div class="metric-card">
          <h2 class="text-base font-semibold text-text-primary mb-4">Platform Health</h2>
          <div class="space-y-4">
            ${roleBreakdown.map(r => `
              <div>
                <div class="mb-1.5 flex justify-between text-sm">
                  <span class="text-text-secondary">${r.label}</span>
                  <span class="font-bold text-text-primary">${r.count} (${Math.round(r.count/total*100)}%)</span>
                </div>
                <div class="h-2.5 overflow-hidden rounded-full bg-white/5">
                  <div class="h-full rounded-full ${r.color}" style="width:${(r.count/total*100).toFixed(1)}%"></div>
                </div>
              </div>
            `).join('')}
            <div class="pt-2 grid grid-cols-2 gap-2 text-sm border-t border-[var(--app-border-subtle)]">
              <div class="rounded-xl bg-white/5 p-2 text-center">
                <p class="text-text-muted text-xs">Active classes</p>
                <p class="font-bold text-text-primary">${state.classes.filter(c=>!c.archived).length}</p>
              </div>
              <div class="rounded-xl bg-white/5 p-2 text-center">
                <p class="text-text-muted text-xs">Total submissions</p>
                <p class="font-bold text-text-primary">${state.submissions.length}</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
