<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classes — UniPlanner</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>window.tailwind={config:{theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)','text-primary':'var(--app-text-primary)','text-secondary':'var(--app-text-secondary)','text-muted':'var(--app-text-muted)','border-subtle':'var(--app-border-subtle)'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <aside id="sidebar" class="sidebar closed"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main id="page-content" class="page-inner"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <!-- Create class modal -->
  <div id="create-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="mb-5 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-text-primary">Create Class</h3>
        <button id="modal-close" class="btn-ghost p-1"><span class="material-symbols-outlined">close</span></button>
      </div>
      <form id="create-class-form" class="space-y-3">
        <input id="cc-title" class="form-input" placeholder="Class title" required />
        <input id="cc-subject" class="form-input" placeholder="Subject (e.g. Design)" required />
        <input id="cc-section" class="form-input" placeholder="Section (e.g. Section A)" required />
        <textarea id="cc-desc" class="form-input" rows="3" placeholder="Description"></textarea>
        <button type="submit" class="btn-primary w-full py-2.5">
          <span class="material-symbols-outlined text-[16px]">add</span> Create Class
        </button>
      </form>
    </div>
  </div>

  <!-- Join class modal -->
  <div id="join-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="mb-5 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-text-primary">Join a Class</h3>
        <button id="join-modal-close" class="btn-ghost p-1"><span class="material-symbols-outlined">close</span></button>
      </div>
      <form id="join-class-form" class="space-y-3">
        <input id="join-code" class="form-input text-base" placeholder="Enter class code (e.g. NX-2048)" required />
        <button type="submit" class="btn-primary w-full py-2.5">
          <span class="material-symbols-outlined text-[16px]">login</span> Join Class
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLayout, escHtml, progressBar, viewPill, showToast } from './js/app.js';
    import { getState, getCurrentUser, getCurrentRole, createClassroom, joinClassroom, archiveClassroom, unarchiveClassroom, subscribe } from './js/store.js';

    initLayout();
    renderPage();
    subscribe(renderPage);

    function renderPage() {
      const state = getState();
      const role = getCurrentRole();
      const user = getCurrentUser();
      const [active, archived] = role === 'student'
        ? [
            state.classes.filter(c => !c.archived && c.enrolledStudentIds.includes(user?.id)),
            state.classes.filter(c => c.archived && c.enrolledStudentIds.includes(user?.id)),
          ]
        : [
            state.classes.filter(c => !c.archived),
            state.classes.filter(c => c.archived),
          ];

      const canCreate = role === 'teacher' || role === 'admin';
      const isStudent = role === 'student';
      const title = role === 'student' ? 'My Courses' : role === 'teacher' ? 'My Classes' : 'All Classes';

      document.getElementById('page-content').innerHTML = `
        <!-- Header -->
        <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-2xl font-semibold text-text-primary">${title}</h1>
            <p class="text-sm text-text-secondary mt-1">${active.length} active · ${archived.length} archived</p>
          </div>
          <div class="flex gap-2">
            ${isStudent ? `<button id="join-btn" class="btn-primary text-sm px-4 py-2"><span class="material-symbols-outlined text-[16px]">login</span> Join Class</button>` : ''}
            ${canCreate ? `<button id="create-btn" class="btn-primary text-sm px-4 py-2"><span class="material-symbols-outlined text-[16px]">add</span> New Class</button>` : ''}
          </div>
        </div>

        <!-- Search -->
        <div class="relative mb-6 max-w-sm">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-[18px]">search</span>
          <input id="search-input" class="form-input pl-9" placeholder="Search classes..." />
        </div>

        <!-- Active classes -->
        <div id="classes-grid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></div>

        ${archived.length > 0 ? `
          <div class="mt-8">
            <h2 class="mb-4 text-sm font-semibold uppercase tracking-widest text-text-muted">Archived Classes</h2>
            <div id="archived-grid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></div>
          </div>
        ` : ''}
      `;

      renderGrid(active, 'classes-grid', false);
      if (archived.length > 0) renderGrid(archived, 'archived-grid', true);

      // Events
      document.getElementById('search-input')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const filtered = active.filter(c => c.title.toLowerCase().includes(q) || c.subject.toLowerCase().includes(q));
        renderGrid(filtered, 'classes-grid', false);
      });

      document.getElementById('create-btn')?.addEventListener('click', () => {
        document.getElementById('create-modal').classList.remove('hidden');
      });

      document.getElementById('join-btn')?.addEventListener('click', () => {
        document.getElementById('join-modal').classList.remove('hidden');
      });
    }

    function renderGrid(classes, gridId, isArchived) {
      const grid = document.getElementById(gridId);
      if (!grid) return;
      const state = getState();
      const role = getCurrentRole();
      const canManage = role === 'teacher' || role === 'admin';

      if (classes.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No classes found.</p>';
        return;
      }

      grid.innerHTML = classes.map(c => `
        <a href="class-detail.html?id=${c.id}" class="block rounded-2xl border border-[var(--app-border-subtle)] bg-[var(--panel)] p-5 transition hover:border-blue-500/40 hover:shadow-lg group ${isArchived ? 'opacity-60' : ''}">
          <div class="mb-4 flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="h-11 w-11 shrink-0 rounded-2xl shadow-lg" style="background:${c.color}"></div>
              <div class="min-w-0">
                <p class="font-semibold text-text-primary truncate">${escHtml(c.title)}</p>
                <p class="text-xs text-text-secondary">${escHtml(c.subject)} · ${escHtml(c.section)}</p>
              </div>
            </div>
            ${canManage && !isArchived ? `
              <button class="archive-btn btn-ghost p-1 opacity-0 group-hover:opacity-100" data-id="${c.id}" title="Archive">
                <span class="material-symbols-outlined text-[16px]">archive</span>
              </button>` : ''}
            ${isArchived ? `
              <button class="unarchive-btn btn-ghost p-1" data-id="${c.id}" title="Restore">
                <span class="material-symbols-outlined text-[16px]">unarchive</span>
              </button>` : ''}
          </div>
          <p class="mb-3 text-sm text-text-secondary line-clamp-2">${escHtml(c.description)}</p>
          <div class="mb-3">
            <div class="mb-1 flex justify-between text-xs text-text-muted">
              <span>Progress</span><span class="font-semibold text-text-secondary">${c.progress}%</span>
            </div>
            ${progressBar(c.progress)}
          </div>
          <div class="flex flex-wrap gap-1.5 mb-3">
            ${(c.tags ?? []).map(t => `<span class="view-pill">${escHtml(t)}</span>`).join('')}
          </div>
          <div class="flex items-center justify-between text-xs text-text-muted border-t border-[var(--app-border-subtle)] pt-3 mt-3">
            <span>${c.enrolledStudentIds.length} learner${c.enrolledStudentIds.length !== 1 ? 's' : ''}</span>
            <span class="font-mono text-text-secondary">${c.code}</span>
          </div>
          ${(() => { const rc = state.resources.filter(r => r.classId === c.id).length; return rc > 0 ? `<p class="mt-1 text-xs text-text-muted"><span class="material-symbols-outlined text-[12px]">folder_open</span> ${rc} resource${rc !== 1 ? 's' : ''}</p>` : ''; })()}
          ${c.nextDeadline && c.nextDeadline !== 'No deadline set' ? `<p class="mt-1 text-xs text-amber-400"><span class="material-symbols-outlined text-[12px]">schedule</span> ${escHtml(c.nextDeadline)}</p>` : ''}
        </a>
      `).join('');

      document.querySelectorAll('.archive-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); archiveClassroom(btn.dataset.id); showToast('Class archived.'); });
      });
      document.querySelectorAll('.unarchive-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); unarchiveClassroom(btn.dataset.id); showToast('Class restored.', 'success'); });
      });
    }

    // Modal events
    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('create-modal').classList.add('hidden'));
    document.getElementById('join-modal-close').addEventListener('click', () => document.getElementById('join-modal').classList.add('hidden'));
    document.getElementById('create-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden'); });
    document.getElementById('join-modal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden'); });

    document.getElementById('create-class-form').addEventListener('submit', (e) => {
      e.preventDefault();
      createClassroom({
        title: document.getElementById('cc-title').value,
        subject: document.getElementById('cc-subject').value,
        section: document.getElementById('cc-section').value,
        description: document.getElementById('cc-desc').value,
      });
      document.getElementById('create-modal').classList.add('hidden');
      document.getElementById('create-class-form').reset();
      showToast('Class created!', 'success');
    });

    document.getElementById('join-class-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const result = joinClassroom(document.getElementById('join-code').value);
      document.getElementById('join-modal').classList.add('hidden');
      document.getElementById('join-class-form').reset();
      showToast(result.ok ? 'Joined class!' : (result.error ?? 'Class not found.'), result.ok ? 'success' : 'error');
    });
  </script>
</body>
</html>
