<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeedGrader — UniPlanner</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>window.tailwind={config:{theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)','text-primary':'var(--app-text-primary)','text-secondary':'var(--app-text-secondary)','text-muted':'var(--app-text-muted)','border-subtle':'var(--app-border-subtle)'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <aside id="sidebar" class="sidebar closed"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main id="page-content" class="page-inner"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <!-- Grade modal -->
  <div id="grade-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-lg">
      <div class="mb-5 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-text-primary">Grade Submission</h3>
        <button id="grade-modal-close" class="btn-ghost p-1"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div id="grade-submission-info" class="mb-4 rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-4"></div>
      <form id="grade-form" class="space-y-3">
        <div>
          <label class="mb-1 block text-sm text-text-secondary">Score</label>
          <input id="grade-score" type="number" class="form-input" placeholder="Score" min="0" required />
        </div>
        <div>
          <label class="mb-1 block text-sm text-text-secondary">Feedback</label>
          <textarea id="grade-feedback" class="form-input" rows="3" placeholder="Write feedback for the student..."></textarea>
        </div>
        <button type="submit" class="btn-primary w-full py-2.5">
          <span class="material-symbols-outlined text-[16px]">save</span> Save Grade
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initLayout, escHtml, viewPill, showToast, formatDate } from './js/app.js';
    import { getState, getCurrentRole, getCurrentUser, gradeSubmission, removeSubmission, subscribe } from './js/store.js';
    import { requireRole } from './js/app.js';

    if (requireRole(['teacher', 'admin'])) {
    initLayout();
    renderPage();
    subscribe(renderPage);

    let selectedSubId = null;

    function renderPage() {
      const state = getState();
      const role = getCurrentRole();
      const me = getCurrentUser();

      // Teachers only see submissions for their assigned subjects
      const teacherSubjectClassIds = role === 'teacher' && (me?.assignedSubjects?.length ?? 0) > 0
        ? new Set(state.classes.filter(c => me.assignedSubjects.includes(c.subject)).map(c => c.id))
        : null;
      const visibleAssignmentIds = teacherSubjectClassIds
        ? new Set(state.assignments.filter(a => teacherSubjectClassIds.has(a.classId)).map(a => a.id))
        : null;
      const allSubs = visibleAssignmentIds
        ? state.submissions.filter(s => visibleAssignmentIds.has(s.assignmentId))
        : state.submissions;

      const pending = allSubs.filter(s => s.score == null);
      const graded = allSubs.filter(s => s.score != null);

      document.getElementById('page-content').innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-semibold text-text-primary">SpeedGrader</h1>
          <p class="text-sm text-text-secondary mt-1">${pending.length} submissions need grading · ${graded.length} already graded</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-4 sm:grid-cols-4 mb-6">
          <div class="metric-card text-center">
            <p class="text-xs uppercase tracking-widest text-text-muted">Pending</p>
            <p class="mt-1 text-3xl font-bold text-amber-400">${pending.length}</p>
          </div>
          <div class="metric-card text-center">
            <p class="text-xs uppercase tracking-widest text-text-muted">Graded</p>
            <p class="mt-1 text-3xl font-bold text-emerald-400">${graded.length}</p>
          </div>
          <div class="metric-card text-center">
            <p class="text-xs uppercase tracking-widest text-text-muted">Total</p>
            <p class="mt-1 text-3xl font-bold text-text-primary">${allSubs.length}</p>
          </div>
          <div class="metric-card text-center">
            <p class="text-xs uppercase tracking-widest text-text-muted">Avg Score</p>
            <p class="mt-1 text-3xl font-bold text-blue-400">
              ${graded.length ? Math.round(graded.reduce((s,x) => s + (x.score||0), 0) / graded.length) : '—'}
            </p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="mb-5 flex gap-1 rounded-2xl border border-[var(--app-border-subtle)] bg-white/5 p-1 w-fit">
          <button class="grade-tab rounded-xl px-4 py-1.5 text-sm font-medium bg-primary text-white" data-tab="pending">
            Pending (${pending.length})
          </button>
          <button class="grade-tab rounded-xl px-4 py-1.5 text-sm font-medium text-text-secondary hover:text-text-primary" data-tab="graded">
            Graded (${graded.length})
          </button>
        </div>

        <!-- Pending submissions -->
        <div id="tab-pending" class="space-y-3">
          ${pending.length === 0
            ? '<div class="metric-card text-center py-8"><span class="material-symbols-outlined text-4xl text-emerald-400">check_circle</span><p class="mt-3 text-lg font-semibold text-text-primary">All caught up!</p><p class="text-sm text-text-secondary">No submissions awaiting grades.</p></div>'
            : pending.map(sub => renderSubCard(sub, state, false)).join('')
          }
        </div>

        <!-- Graded submissions -->
        <div id="tab-graded" class="hidden space-y-3">
          ${graded.length === 0
            ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No graded submissions yet.</p>'
            : graded.map(sub => renderSubCard(sub, state, true)).join('')
          }
        </div>
      `;

      // Tabs
      document.querySelectorAll('.grade-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.grade-tab').forEach(b => b.className = b.className.replace('bg-primary text-white', 'text-text-secondary hover:text-text-primary'));
          btn.className = btn.className.replace('text-text-secondary hover:text-text-primary', 'bg-primary text-white');
          ['pending','graded'].forEach(t => document.getElementById(`tab-${t}`)?.classList.toggle('hidden', t !== btn.dataset.tab));
        });
      });

      // Grade buttons
      document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedSubId = btn.dataset.id;
          const sub = state.submissions.find(s => s.id === selectedSubId);
          const a = state.assignments.find(x => x.id === sub?.assignmentId);
          const student = state.users.find(u => u.id === sub?.studentId);
          const info = document.getElementById('grade-submission-info');
          info.innerHTML = `
            <div class="flex items-center gap-3 mb-2">
              <img src="${student?.avatar ?? ''}" alt="" class="h-10 w-10 rounded-xl object-cover" />
              <div>
                <p class="font-semibold text-text-primary">${escHtml(student?.name ?? 'Student')}</p>
                <p class="text-sm text-text-secondary">${escHtml(a?.title ?? 'Assignment')}</p>
              </div>
            </div>
            ${sub?.fileUrl
              ? `<a href="${sub.fileUrl}" download="${escHtml(sub.fileName ?? 'file')}" class="inline-flex items-center gap-1 text-xs text-primary hover:underline"><span class="material-symbols-outlined text-[13px]">download</span> ${escHtml(sub.fileName ?? 'Download file')}</a>`
              : `<p class="text-xs text-text-muted">File: ${escHtml(sub?.fileName ?? '')}</p>`
            }
            <p class="text-xs text-text-muted">Submitted: ${sub?.submittedAt ? formatDate(sub.submittedAt) : '—'}</p>
            ${a?.maxPoints ? `<p class="text-xs text-text-muted">Max: ${a.maxPoints} pts</p>` : ''}
          `;
          document.getElementById('grade-score').max = a?.maxPoints ?? 100;
          document.getElementById('grade-score').value = sub?.score ?? '';
          document.getElementById('grade-feedback').value = sub?.teacherFeedback ?? '';
          document.getElementById('grade-modal').classList.remove('hidden');
        });
      });

      // Delete buttons
      document.querySelectorAll('.delete-sub-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Remove this submission?')) {
            removeSubmission(btn.dataset.id);
            showToast('Submission removed.', 'info');
          }
        });
      });
    }

    function renderSubCard(sub, state, isGraded) {
      const a = state.assignments.find(x => x.id === sub.assignmentId);
      const student = state.users.find(u => u.id === sub.studentId);
      const cls = state.classes.find(c => c.id === a?.classId);
      const pct = a?.maxPoints && sub.score !== undefined ? Math.round(sub.score / a.maxPoints * 100) : null;

      return `
        <div class="metric-card">
          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <img src="${student?.avatar ?? ''}" alt="${escHtml(student?.name ?? '')}" class="h-11 w-11 rounded-xl object-cover shrink-0" onerror="this.style.display='none'" />
              <div>
                <p class="font-semibold text-text-primary">${escHtml(student?.name ?? 'Student')}</p>
                <p class="text-xs text-text-secondary">${escHtml(a?.title ?? 'Assignment')} · ${escHtml(cls?.title ?? '')}</p>
                ${sub.fileUrl
                  ? `<a href="${sub.fileUrl}" download="${escHtml(sub.fileName ?? 'file')}" class="inline-flex items-center gap-1 mt-0.5 text-xs text-primary hover:underline"><span class="material-symbols-outlined text-[13px]">download</span> ${escHtml(sub.fileName)}</a>`
                  : `<p class="text-xs text-text-muted mt-0.5">File: ${escHtml(sub.fileName)}</p>`
                }
              </div>
            </div>
            <div class="text-right shrink-0">
              ${isGraded && pct !== null
                ? `<p class="text-lg font-bold ${pct >= 80 ? 'text-emerald-400' : pct >= 60 ? 'text-amber-400' : 'text-red-400'}">${sub.score}/${a?.maxPoints}</p>`
                : '<span class="badge bg-amber-500/10 text-amber-400 border border-amber-500/20">Needs grading</span>'
              }
              <p class="text-xs text-text-muted mt-1">${sub.submittedAt ? formatDate(sub.submittedAt) : ''}</p>
            </div>
          </div>
          ${sub.notes ? `<p class="mt-2 rounded-xl border border-[var(--app-border-subtle)] bg-black/10 px-3 py-2 text-xs text-text-secondary">${escHtml(sub.notes)}</p>` : ''}
          ${sub.teacherFeedback ? `<p class="mt-2 rounded-xl border border-emerald-500/20 bg-emerald-500/5 px-3 py-2 text-xs italic text-emerald-300">"${escHtml(sub.teacherFeedback)}"</p>` : ''}
          <div class="mt-3 flex gap-2 justify-end">
            <button class="grade-btn btn-primary text-xs px-3 py-1.5" data-id="${sub.id}">
              <span class="material-symbols-outlined text-[14px]">edit_note</span> ${isGraded ? 'Re-grade' : 'Grade'}
            </button>
            <button class="delete-sub-btn btn-ghost text-xs px-3 py-1.5 text-red-400 hover:bg-red-500/10" data-id="${sub.id}">
              <span class="material-symbols-outlined text-[14px]">delete</span>
            </button>
          </div>
        </div>
      `;
    }

    // Grade modal
    document.getElementById('grade-modal-close').addEventListener('click', () => document.getElementById('grade-modal').classList.add('hidden'));
    document.getElementById('grade-modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden'); });
    document.getElementById('grade-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const score = Number(document.getElementById('grade-score').value);
      const feedback = document.getElementById('grade-feedback').value;
      gradeSubmission(selectedSubId, score, feedback);
      document.getElementById('grade-modal').classList.add('hidden');
      showToast('Grade saved!', 'success');
    });
    } // end requireRole guard
  </script>
</body>
</html>
