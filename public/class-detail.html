<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Detail — UniPlanner</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>window.tailwind={config:{theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)','text-primary':'var(--app-text-primary)','text-secondary':'var(--app-text-secondary)','text-muted':'var(--app-text-muted)','border-subtle':'var(--app-border-subtle)'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <aside id="sidebar" class="sidebar closed"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main id="page-content" class="page-inner"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { initLayout, escHtml, progressBar, viewPill, showToast } from './js/app.js';
    import { getState, getCurrentUser, getCurrentRole, createThread, sendMessage, addResource, subscribe } from './js/store.js';
    import { uploadFile } from './js/cloudinary.js';

    let activeTab = 'resources';

    initLayout();
    renderPage();
    subscribe(renderPage);

    function getClassId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    function renderPage() {
      const classId = getClassId();
      const state = getState();
      const classroom = state.classes.find(c => c.id === classId);

      if (!classroom) {
        document.getElementById('page-content').innerHTML = `
          <div class="metric-card text-center py-12">
            <span class="material-symbols-outlined text-5xl text-text-muted">school</span>
            <h2 class="mt-4 text-lg font-semibold text-text-primary">Class not found</h2>
            <p class="mt-2 text-sm text-text-secondary">This class may have been removed.</p>
            <a href="classes.html" class="btn-primary mt-4 inline-flex">Back to Classes</a>
          </div>
        `;
        return;
      }

      const user = getCurrentUser();
      const role = getCurrentRole();
      const canManage = role === 'teacher' || role === 'admin';
      const assignments = state.assignments.filter(a => a.classId === classId);
      const discussions = state.discussions.filter(d => d.classId === classId);
      const messages = state.messages.filter(m => m.classId === classId);
      const resources = state.resources.filter(r => r.classId === classId);
      const realLearners = classroom.enrolledStudentIds.length;
      const realResources = resources.length;

      document.getElementById('page-content').innerHTML = `
        <!-- Back + header -->
        <div class="mb-5">
          <a href="classes.html" class="inline-flex items-center gap-1 text-sm text-text-secondary hover:text-text-primary mb-4">
            <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back to Classes
          </a>
          <div class="overflow-hidden rounded-2xl border border-white/10 p-6 sm:p-8"
            style="background:linear-gradient(135deg,${classroom.color}33,transparent 60%)">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
              <div class="flex items-start gap-4">
                <div class="h-14 w-14 shrink-0 rounded-2xl shadow-xl" style="background:${classroom.color}"></div>
                <div>
                  <div class="flex flex-wrap items-center gap-2 mb-1">
                    <h1 class="text-2xl font-semibold text-white">${escHtml(classroom.title)}</h1>
                    ${classroom.archived ? '<span class="badge bg-white/10 text-white/60">Archived</span>' : ''}
                  </div>
                  <p class="text-text-secondary">${escHtml(classroom.subject)} · ${escHtml(classroom.section)}</p>
                  <p class="text-sm text-text-muted mt-1">Taught by ${escHtml(classroom.teacherName)}</p>
                </div>
              </div>
              <div class="flex flex-wrap gap-2 text-sm">
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-center">
                  <p class="text-[10px] uppercase tracking-widest text-white/40">Learners</p>
                  <p class="font-bold text-white">${realLearners}</p>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-center">
                  <p class="text-[10px] uppercase tracking-widest text-white/40">Resources</p>
                  <p class="font-bold text-white">${realResources}</p>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-center">
                  <p class="text-[10px] uppercase tracking-widest text-white/40">Progress</p>
                  <p class="font-bold text-white">${classroom.progress}%</p>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-center">
                  <p class="text-[10px] uppercase tracking-widest text-white/40">Code</p>
                  <p class="font-bold font-mono text-white">${escHtml(classroom.code)}</p>
                </div>
              </div>
            </div>
            <div class="mt-4">
              ${progressBar(classroom.progress)}
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="mb-5 flex flex-wrap gap-1 rounded-2xl border border-[var(--app-border-subtle)] bg-white/5 p-1 w-fit">
          ${(canManage ? ['resources','assignments','discussions','messages','members'] : ['resources','assignments','discussions','messages']).map(tab => `
            <button class="tab-btn rounded-xl px-4 py-1.5 text-sm font-medium transition ${tab === activeTab ? 'bg-primary text-white' : 'text-text-secondary hover:text-text-primary'}" data-tab="${tab}">
              ${tab.charAt(0).toUpperCase() + tab.slice(1)}
            </button>
          `).join('')}
        </div>

        <!-- Tab panels -->
        <div id="tab-assignments" class="tab-panel space-y-3 ${activeTab !== 'assignments' ? 'hidden' : ''}">
          <div class="mb-3 flex items-center justify-between">
            <p class="text-sm text-text-secondary">${assignments.length} assignment${assignments.length !== 1 ? 's' : ''}</p>
            <a href="assignments.html" class="text-sm font-medium text-primary hover:underline">View all</a>
          </div>
          ${assignments.length === 0 ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No assignments yet.</p>'
            : assignments.map(a => {
                const realSubs = state.submissions.filter(s => s.assignmentId === a.id);
                const mySubmission = user ? realSubs.find(s => s.studentId === user.id) : null;
                const avgScore = realSubs.length > 0
                  ? Math.round(realSubs.filter(s => s.score != null).reduce((sum, s) => sum + s.score, 0) / (realSubs.filter(s => s.score != null).length || 1))
                  : null;
                return `
              <div class="metric-card">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1 min-w-0">
                    <p class="font-semibold text-text-primary">${escHtml(a.title)}</p>
                    <p class="text-sm text-text-secondary mt-0.5">${escHtml(a.description)}</p>
                    ${a.attachmentUrl ? `
                      <a href="${escHtml(a.attachmentUrl)}" target="_blank" rel="noopener"
                        class="inline-flex items-center gap-1.5 mt-2 rounded-lg border border-[var(--app-border-subtle)] bg-white/5 px-2.5 py-1 text-xs font-medium text-primary hover:bg-primary/10 transition">
                        <span class="material-symbols-outlined text-[14px]">attach_file</span>
                        ${escHtml(a.attachmentName || a.attachmentUrl.split('/').pop().split('?')[0] || 'Attachment')}
                      </a>` : ''}
                  </div>
                  <div class="text-right shrink-0">
                    ${viewPill(a.kind)}
                    <p class="text-xs text-text-muted mt-1">${escHtml(a.dueDate)}</p>
                  </div>
                </div>
                <div class="mt-3 flex flex-wrap gap-2 text-xs text-text-muted">
                  <span>${a.maxPoints} pts</span>
                  <span>·</span><span>${realSubs.length} submission${realSubs.length !== 1 ? 's' : ''}</span>
                  ${role === 'student'
                    ? mySubmission?.score != null
                      ? `<span>·</span><span class="text-emerald-400">Your score: ${mySubmission.score}/${a.maxPoints}</span>`
                      : mySubmission
                        ? `<span>·</span><span class="text-amber-400">Submitted · pending grade</span>`
                        : ''
                    : avgScore != null ? `<span>·</span><span>Avg: ${avgScore}</span>` : ''
                  }
                </div>
              </div>`;
              }).join('')
          }
        </div>

        <div id="tab-discussions" class="tab-panel space-y-3 ${activeTab !== 'discussions' ? 'hidden' : ''}">
          <form id="new-thread-form" class="metric-card flex gap-2">
            <input id="thread-msg" class="form-input flex-1" placeholder="Start a discussion..." />
            <button type="submit" class="btn-primary px-4 shrink-0">Post</button>
          </form>
          ${discussions.length === 0 ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No discussions yet.</p>'
            : discussions.map(d => `
              <div class="metric-card">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex items-start gap-3">
                    <div class="h-9 w-9 shrink-0 rounded-full ${d.role === 'teacher' ? 'bg-emerald-500/20' : d.role === 'admin' ? 'bg-purple-500/20' : 'bg-blue-500/20'} flex items-center justify-center">
                      <span class="material-symbols-outlined text-[14px] ${d.role === 'teacher' ? 'text-emerald-400' : d.role === 'admin' ? 'text-purple-400' : 'text-blue-400'}">person</span>
                    </div>
                    <div>
                      <div class="flex items-center gap-2">
                        <p class="text-sm font-semibold text-text-primary">${escHtml(d.author)}</p>
                        <span class="badge ${d.role === 'teacher' ? 'role-teacher' : d.role === 'admin' ? 'role-admin' : 'role-student'}">${d.role}</span>
                        ${d.pinned ? '<span class="material-symbols-outlined text-[14px] text-amber-400">push_pin</span>' : ''}
                      </div>
                      <p class="text-sm text-text-secondary mt-1">${escHtml(d.message)}</p>
                    </div>
                  </div>
                  <div class="text-right shrink-0">
                    <p class="text-xs text-text-muted">${escHtml(d.time)}</p>
                    <p class="text-xs text-text-secondary mt-1">${d.replies} replies</p>
                  </div>
                </div>
              </div>
            `).join('')
          }
        </div>

        <div id="tab-messages" class="tab-panel ${activeTab !== 'messages' ? 'hidden' : ''}">
          <div class="metric-card flex flex-col gap-3" style="max-height:400px">
            <div id="messages-list" class="flex-1 overflow-y-auto space-y-2 min-h-32">
              ${messages.length === 0 ? '<p class="text-sm text-text-secondary text-center py-6">No messages yet.</p>'
                : messages.map(m => `
                  <div class="flex items-start gap-2">
                    <div class="h-7 w-7 shrink-0 rounded-full bg-blue-500/20 flex items-center justify-center">
                      <span class="material-symbols-outlined text-[12px] text-blue-400">person</span>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2">
                        <p class="text-xs font-semibold text-text-primary">${escHtml(m.sender)}</p>
                        <p class="text-[10px] text-text-muted">${escHtml(m.time)}</p>
                      </div>
                      <p class="text-sm text-text-secondary">${escHtml(m.message)}</p>
                    </div>
                  </div>
                `).join('')
              }
            </div>
            <form id="send-message-form" class="flex gap-2 border-t border-[var(--app-border-subtle)] pt-3">
              <input id="msg-input" class="form-input flex-1" placeholder="Send a message..." />
              <button type="submit" class="btn-primary px-4 shrink-0">Send</button>
            </form>
          </div>
        </div>

        <div id="tab-resources" class="tab-panel space-y-3 ${activeTab !== 'resources' ? 'hidden' : ''}">
          ${canManage ? `
          <div class="mb-3">
            <button id="add-resource-btn" class="btn-primary text-sm px-4 py-2">
              <span class="material-symbols-outlined text-[16px]">upload_file</span> Upload Resource
            </button>
          </div>
          <form id="add-resource-form" class="metric-card space-y-3 hidden">
            <div class="file-drop" id="res-drop-zone">
              <input id="res-file" type="file"
                accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.jpg,.jpeg,.png,.gif,.mp4,.mov,.avi,.webm,.zip,.rar" />
              <span class="material-symbols-outlined text-3xl text-text-muted block mb-1">upload_file</span>
              <p class="text-sm file-drop-name" id="res-file-name" style="color:var(--app-text-secondary)">Click or drag a file here</p>
              <p class="text-xs mt-0.5" style="color:var(--app-text-muted)">PDF, Word, images, video, ZIP</p>
            </div>
            <input id="res-name" class="form-input" placeholder="Name (auto-filled from file)" required />
            <div>
              <label class="text-xs text-text-muted mb-1 block">Or paste a URL / link</label>
              <input id="res-url" class="form-input" placeholder="https://..." />
            </div>
            <select id="res-type" class="form-input">
              <option value="document">Document</option>
              <option value="video">Video</option>
              <option value="link">Link</option>
              <option value="folder">Folder</option>
            </select>
            <input id="res-size" class="form-input" placeholder="Size (auto-filled)" />
            <textarea id="res-preview" class="form-input" rows="2" placeholder="Description (optional)"></textarea>
            <div class="flex gap-2">
              <button type="submit" class="btn-primary flex-1 py-2">Add Resource</button>
              <button type="button" id="cancel-resource-btn" class="btn-ghost flex-1 py-2">Cancel</button>
            </div>
          </form>
          ` : ''}
          ${resources.length === 0 ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No resources yet.</p>'
            : resources.map(r => `
              <div class="metric-card flex items-center gap-4">
                <div class="h-10 w-10 shrink-0 rounded-xl bg-blue-500/20 flex items-center justify-center">
                  <span class="material-symbols-outlined text-blue-400">${r.type === 'video' ? 'play_circle' : r.type === 'folder' ? 'folder' : r.type === 'link' ? 'link' : 'description'}</span>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="font-semibold text-text-primary truncate">${escHtml(r.name)}</p>
                  <p class="text-xs text-text-secondary mt-0.5">${escHtml(r.preview)}</p>
                </div>
                <div class="flex items-center gap-3 shrink-0">
                  <div class="text-right">
                    <p class="text-xs text-text-muted">${escHtml(r.size)}</p>
                    <p class="text-xs text-text-secondary">${escHtml(r.updatedAt)}</p>
                  </div>
                  ${r.url ? `<a href="${escHtml(r.url)}" target="_blank" class="btn-ghost p-1.5" title="Download"><span class="material-symbols-outlined text-[18px] text-primary">download</span></a>` : ''}
                </div>
              </div>
            `).join('')
          }
        </div>

        ${canManage ? renderMembersTab(classroom, state, activeTab) : ''}
      `;

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.className = b.className.replace('bg-primary text-white', 'text-text-secondary hover:text-text-primary');
          });
          btn.className = btn.className.replace('text-text-secondary hover:text-text-primary', 'bg-primary text-white');
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
          document.getElementById(`tab-${btn.dataset.tab}`)?.classList.remove('hidden');
        });
      });

      // New discussion thread
      document.getElementById('new-thread-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const msg = document.getElementById('thread-msg').value.trim();
        if (!msg) return;
        createThread({ classId, author: user.name, message: msg, role });
        document.getElementById('thread-msg').value = '';
        showToast('Discussion posted!', 'success');
      });

      // Send message
      document.getElementById('send-message-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg-input').value.trim();
        if (!msg) return;
        sendMessage({ classId, sender: user.name, role, message: msg });
        document.getElementById('msg-input').value = '';
      });

      // Resource upload
      document.getElementById('add-resource-btn')?.addEventListener('click', () => {
        document.getElementById('add-resource-form').classList.remove('hidden');
      });
      document.getElementById('cancel-resource-btn')?.addEventListener('click', () => {
        document.getElementById('add-resource-form').classList.add('hidden');
        document.getElementById('add-resource-form').reset();
        const z = document.getElementById('res-drop-zone');
        const l = document.getElementById('res-file-name');
        if (z) z.classList.remove('has-file', 'drag-over');
        if (l) l.textContent = 'Click or drag a file here';
      });
      document.getElementById('res-file')?.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        const zone = document.getElementById('res-drop-zone');
        const label = document.getElementById('res-file-name');
        if (!file) {
          if (label) label.textContent = 'Click or drag a file here';
          if (zone) zone.classList.remove('has-file');
          return;
        }
        if (label) label.textContent = file.name;
        if (zone) zone.classList.add('has-file');
        document.getElementById('res-name').value = file.name;
        const kb = file.size / 1024;
        document.getElementById('res-size').value = kb < 1024 ? kb.toFixed(0) + ' KB' : (kb / 1024).toFixed(1) + ' MB';
        const ext = file.name.split('.').pop().toLowerCase();
        const typeMap = { pdf:'document', doc:'document', docx:'document', txt:'document', ppt:'document', pptx:'document', mp4:'video', mov:'video', avi:'video', webm:'video' };
        if (typeMap[ext]) document.getElementById('res-type').value = typeMap[ext];
      });
      const resDropZone = document.getElementById('res-drop-zone');
      if (resDropZone) {
        resDropZone.addEventListener('dragover', (e) => { e.preventDefault(); resDropZone.classList.add('drag-over'); });
        resDropZone.addEventListener('dragleave', () => resDropZone.classList.remove('drag-over'));
        resDropZone.addEventListener('drop', () => resDropZone.classList.remove('drag-over'));
      }
      document.getElementById('add-resource-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('res-name').value.trim();
        const urlInput = document.getElementById('res-url').value.trim();
        const type = document.getElementById('res-type').value;
        const size = document.getElementById('res-size').value.trim() || '—';
        const preview = document.getElementById('res-preview').value.trim();
        const file = document.getElementById('res-file').files?.[0];
        if (!name) { showToast('Please enter a resource name.', 'error'); return; }
        const btn = e.target.querySelector('[type="submit"]');
        const origLabel = btn.textContent;
        if (file) {
          btn.disabled = true;
          btn.textContent = 'Uploading…';
          try {
            const result = await uploadFile(file, {
              onProgress: (pct) => { btn.textContent = `Uploading… ${pct}%`; },
            });
            addResource({ classId, name: name || result.name, type, size: result.size, preview, url: result.url });
            document.getElementById('add-resource-form').classList.add('hidden');
            document.getElementById('add-resource-form').reset();
            showToast('Resource uploaded!', 'success');
          } catch (err) {
            showToast('Upload failed: ' + err.message, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = origLabel;
          }
        } else {
          addResource({ classId, name, type, size, preview, url: urlInput });
          document.getElementById('add-resource-form').classList.add('hidden');
          document.getElementById('add-resource-form').reset();
          showToast('Resource added!', 'success');
        }
      });
    }
    function renderMembersTab(classroom, state, activeTab) {
      const students = classroom.enrolledStudentIds
        .map(sid => state.users.find(u => u.id === sid))
        .filter(Boolean);
      const cards = students.length === 0
        ? `<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-6 text-center">No students enrolled yet. Share the class code <strong>${escHtml(classroom.code)}</strong> to let students join.</p>`
        : students.map(s => `
            <div class="metric-card flex items-center gap-3">
              <img src="${escHtml(s.avatar ?? '')}" alt="" class="h-10 w-10 rounded-xl object-cover shrink-0" onerror="this.style.opacity='0.3'" />
              <div class="flex-1 min-w-0">
                <p class="font-semibold text-text-primary">${escHtml(s.name)}</p>
                <p class="text-xs text-text-secondary">${escHtml(s.email)}</p>
              </div>
              <span class="badge role-student shrink-0">student</span>
            </div>
          `).join('');
      return `
        <div id="tab-members" class="tab-panel space-y-2 ${activeTab !== 'members' ? 'hidden' : ''}">
          <p class="text-sm text-text-secondary mb-3">${students.length} enrolled student${students.length !== 1 ? 's' : ''}</p>
          ${cards}
        </div>
      `;
    }
  </script>
</body>
</html>
