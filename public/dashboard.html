<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — UniPlanner</title>
  <link rel="stylesheet" href="css/theme.css" />
  <script>window.tailwind={config:{theme:{extend:{colors:{primary:'var(--primary)',secondary:'var(--secondary)','text-primary':'var(--app-text-primary)','text-secondary':'var(--app-text-secondary)','text-muted':'var(--app-text-muted)','border-subtle':'var(--app-border-subtle)'}}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <aside id="sidebar" class="sidebar closed"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div class="main-content">
    <header id="topbar" class="topbar"></header>
    <main id="page-content" class="page-inner"></main>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { initLayout, escHtml, progressBar, viewPill, showToast } from './js/app.js';
    import { getState, getCurrentUser, getCurrentRole, createAssignment, subscribe } from './js/store.js';
    import { analyticsByRole } from './js/data.js';

    initLayout();
    renderDashboard();
    subscribe(renderDashboard);

    function renderDashboard() {
      const role = getCurrentRole();
      if (role === 'teacher') renderTeacher();
      else if (role === 'admin') renderAdmin();
      else renderStudent();
    }

    // ── Student Dashboard ──────────────────────────────────────────────
    function renderStudent() {
      const state = getState();
      const user = getCurrentUser();
      if (!user) return;
      const analytics = analyticsByRole.student;
      const enrolledClasses = state.classes.filter(c => !c.archived && c.enrolledStudentIds.includes(user.id));
      const submittedIds = new Set(state.submissions.filter(s => s.studentId === user.id).map(s => s.assignmentId));
      const enrolledClassIds = new Set(enrolledClasses.map(c => c.id));
      const pending = state.assignments.filter(a =>
        enrolledClassIds.has(a.classId) &&
        (a.status === 'assigned' || a.status === 'draft') &&
        !submittedIds.has(a.id)
      ).slice(0, 4);
      const courses = enrolledClasses.slice(0, 3);
      const events = state.events.filter(e => e.type === 'deadline' || e.type === 'exam').slice(0, 4);
      const notifs = state.notifications.filter(n => n.unread).slice(0, 3);
      const graded = state.submissions.filter(s => s.score !== undefined).slice(0, 3);

      document.getElementById('page-content').innerHTML = `
        <div class="space-y-5 lg:space-y-7">
          <!-- Hero -->
          <section class="overflow-hidden rounded-2xl border border-white/10 p-5 sm:rounded-3xl sm:p-7 lg:p-10"
            style="background:linear-gradient(135deg,rgba(37,99,235,.25),rgba(56,189,248,.1),rgba(15,118,110,.08))">
            <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
              <div class="space-y-3">
                <div class="inline-flex items-center gap-2 rounded-full border border-blue-400/20 bg-blue-500/10 px-3 py-1 text-xs uppercase tracking-widest text-blue-300">
                  <span class="material-symbols-outlined text-[14px]">book</span> Student Portal
                </div>
                <h1 class="text-3xl font-semibold text-white sm:text-4xl lg:text-5xl">Hey, ${escHtml(user.name.split(' ')[0])}!</h1>
                <p class="max-w-xl text-sm text-white/70 sm:text-base">
                  You have <strong class="text-white">${pending.length} pending assignment${pending.length !== 1 ? 's' : ''}</strong>
                  and a <strong class="text-amber-300">${analytics.streak}-day streak</strong> going. Keep it up!
                </p>
                <div class="flex flex-wrap gap-2 pt-1">
                  <a href="assignments.html" class="btn-primary text-sm px-4 py-2">
                    <span class="material-symbols-outlined text-[16px]">assignment</span> View Assignments
                  </a>
                  <a href="classes.html" class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-sm font-semibold text-white hover:bg-white/10">
                    <span class="material-symbols-outlined text-[16px]">book</span> My Courses
                  </a>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-2 sm:gap-3 lg:min-w-[240px]">
                ${['GPA','Streak','Done','Courses'].map((label, i) => {
                  const vals = [analytics.averageGrade + '%', analytics.streak + 'd', analytics.completion + '%', courses.length];
                  const colors = ['text-white','text-amber-400','text-emerald-400','text-blue-400'];
                  return `<div class="metric-card text-center">
                    <p class="text-[9px] uppercase tracking-widest text-text-muted">${label}</p>
                    <p class="mt-1 text-2xl font-bold ${colors[i]}">${vals[i]}</p>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </section>

          <div class="grid gap-5 lg:grid-cols-[1.5fr_1fr]">
            <div class="space-y-5">
              <!-- Pending assignments -->
              <div class="metric-card">
                <div class="mb-4 flex items-center justify-between">
                  <div>
                    <h2 class="text-base font-semibold text-text-primary">Pending Assignments</h2>
                    <p class="text-sm text-text-secondary">Work due soon — click to submit.</p>
                  </div>
                  <a href="assignments.html" class="text-sm font-medium text-primary hover:underline">View all</a>
                </div>
                ${pending.length === 0
                  ? '<div class="rounded-xl border border-emerald-500/20 bg-emerald-500/10 p-4 text-center text-sm text-emerald-300">All caught up!</div>'
                  : pending.map(a => {
                      const cls = state.classes.find(c => c.id === a.classId);
                      return `<a href="assignments.html" class="block rounded-xl border border-[var(--app-border-subtle)] border-l-4 border-l-amber-400 bg-white/5 p-3 mb-2 hover:bg-white/10">
                        <div class="flex items-start justify-between gap-2">
                          <div class="min-w-0">
                            <p class="font-semibold text-text-primary truncate">${escHtml(a.title)}</p>
                            <p class="text-xs text-text-secondary mt-0.5">${escHtml(cls?.title ?? 'Unknown')} · ${a.kind}</p>
                          </div>
                          <div class="text-right shrink-0">${viewPill(a.kind)}${a.dueDate ? `<p class="text-[9px] text-amber-400 font-medium mt-1">Due ${escHtml(a.dueDate)}</p>` : ''}</div>
                        </div>
                        <div class="mt-2 flex justify-between text-xs text-text-muted">
                          <span>${a.maxPoints} pts</span>
                          <span class="text-primary">Submit work →</span>
                        </div>
                      </a>`;
                    }).join('')
                }
              </div>

              <!-- My courses -->
              <div class="metric-card">
                <div class="mb-4 flex items-center justify-between">
                  <h2 class="text-base font-semibold text-text-primary">My Enrolled Courses</h2>
                  <a href="classes.html" class="text-sm font-medium text-primary hover:underline">All courses</a>
                </div>
                <div class="space-y-3">
                  ${courses.map(c => `
                    <a href="class-detail.html?id=${c.id}" class="block rounded-2xl border border-[var(--app-border-subtle)] bg-white/5 p-4 hover:border-blue-500/40 hover:bg-white/10">
                      <div class="flex items-start justify-between gap-3">
                        <div class="flex items-start gap-3">
                          <div class="mt-0.5 h-9 w-9 shrink-0 rounded-xl" style="background:${c.color}"></div>
                          <div><p class="font-semibold text-text-primary">${escHtml(c.title)}</p>
                          <p class="text-xs text-text-secondary">${escHtml(c.subject)} · ${escHtml(c.teacherName)}</p></div>
                        </div>
                        <span class="font-bold text-white">${c.progress}%</span>
                      </div>
                      <div class="mt-3">${progressBar(c.progress)}</div>
                      <p class="mt-2 text-xs text-text-muted">${c.enrolledStudentIds.length} learner${c.enrolledStudentIds.length !== 1 ? 's' : ''} · ${state.resources.filter(r => r.classId === c.id).length} resources</p>
                    </a>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="space-y-5">
              <!-- Recent grades -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-1">Recent Grades</h2>
                <p class="text-sm text-text-secondary mb-4">Your graded submissions.</p>
                ${graded.length === 0
                  ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-4">No graded work yet.</p>'
                  : graded.map(sub => {
                      const a = state.assignments.find(x => x.id === sub.assignmentId);
                      const pct = a?.maxPoints ? Math.round((sub.score / a.maxPoints) * 100) : 0;
                      const color = pct >= 80 ? 'text-emerald-400' : pct >= 60 ? 'text-amber-400' : 'text-red-400';
                      return `<div class="rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-4 mb-2">
                        <div class="flex justify-between gap-3">
                          <div><p class="text-sm font-semibold text-text-primary">${escHtml(a?.title ?? 'Assignment')}</p>
                          <p class="text-xs text-text-secondary mt-0.5">${escHtml(sub.fileName)}</p></div>
                          <span class="text-lg font-bold ${color}">${sub.score}/${a?.maxPoints}</span>
                        </div>
                        ${sub.teacherFeedback ? `<p class="mt-2 rounded-lg border border-[var(--app-border-subtle)] bg-black/10 px-3 py-2 text-xs italic text-text-secondary">"${escHtml(sub.teacherFeedback)}"</p>` : ''}
                      </div>`;
                    }).join('')
                }
              </div>

              <!-- Upcoming deadlines -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-1">Upcoming Deadlines</h2>
                <p class="text-sm text-text-secondary mb-4">Exams and due dates.</p>
                ${events.length === 0
                  ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-4">No upcoming deadlines.</p>'
                  : events.map(ev => `
                    <a href="calendar.html" class="block rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3 mb-2 hover:bg-white/10">
                      <div class="flex items-center justify-between gap-2">
                        <div><p class="text-sm font-semibold text-text-primary">${escHtml(ev.title)}</p>
                        <p class="text-xs text-text-muted mt-0.5">${escHtml(ev.date)} · ${escHtml(ev.startTime)}</p></div>
                        ${viewPill(ev.type)}
                      </div>
                    </a>
                  `).join('')
                }
              </div>

              <!-- Notifications -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-4">Notifications</h2>
                ${notifs.length === 0
                  ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-4">You\'re all caught up.</p>'
                  : notifs.map(n => `
                    <div class="rounded-xl border border-[var(--app-border-subtle)] ${n.unread ? 'bg-blue-500/10' : 'bg-white/5'} p-3 mb-2">
                      <div class="flex items-start justify-between gap-2">
                        <div><p class="text-sm font-semibold text-text-primary">${escHtml(n.title)}</p>
                        <p class="text-xs text-text-secondary mt-0.5">${escHtml(n.description)}</p></div>
                        ${n.unread ? '<span class="h-2 w-2 rounded-full bg-blue-500 mt-1 inline-block shrink-0"></span>' : ''}
                      </div>
                    </div>
                  `).join('')
                }
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ── Teacher Dashboard ──────────────────────────────────────────────
    function renderTeacher() {
      const state = getState();
      const user = getCurrentUser();
      if (!user) return;
      const analytics = analyticsByRole.teacher;
      const myClasses = state.classes.filter(c => !c.archived);
      const pendingSubs = state.submissions.filter(s => s.score == null).slice(0, 5);
      const upcomingClasses = state.events.filter(e => e.type === 'class').slice(0, 4);
      const notifs = state.notifications.filter(n => n.unread).slice(0, 3);
      const totalStudents = myClasses.reduce((sum, c) => sum + c.enrolledStudentIds.length, 0);

      document.getElementById('page-content').innerHTML = `
        <div class="space-y-7">
          <section class="overflow-hidden rounded-3xl border border-white/10 p-7 sm:p-10"
            style="background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(37,99,235,.1),rgba(124,58,237,.08))">
            <div class="flex flex-col gap-6 xl:flex-row xl:items-center xl:justify-between">
              <div class="space-y-3">
                <div class="inline-flex items-center gap-2 rounded-full border border-emerald-400/20 bg-emerald-500/10 px-3 py-1 text-xs uppercase tracking-widest text-emerald-300">
                  <span class="material-symbols-outlined text-[14px]">school</span> Educator Portal
                </div>
                <h1 class="text-4xl font-semibold text-white sm:text-5xl">Welcome, ${escHtml(user.name.split(' ')[0])}!</h1>
                <p class="max-w-xl text-lg text-white/70">
                  You have <strong class="text-white">${pendingSubs.length} submission${pendingSubs.length !== 1 ? 's' : ''} to grade</strong>
                  and <strong class="text-emerald-300">${myClasses.length} active class${myClasses.length !== 1 ? 'es' : ''}</strong>.
                </p>
                <div class="flex flex-wrap gap-3 pt-1">
                  <a href="grading.html" class="inline-flex items-center gap-2 rounded-2xl bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:brightness-110">
                    <span class="material-symbols-outlined text-[16px]">edit_note</span> SpeedGrader
                  </a>
                  <a href="classes.html" class="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-5 py-2.5 text-sm font-semibold text-white hover:bg-white/10">
                    <span class="material-symbols-outlined text-[16px]">school</span> My Classes
                  </a>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3 xl:min-w-[260px]">
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Students</p><p class="mt-1 text-3xl font-bold text-white">${totalStudents}</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">To Grade</p><p class="mt-1 text-3xl font-bold text-amber-400">${pendingSubs.length}</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Avg Grade</p><p class="mt-1 text-3xl font-bold text-emerald-400">${analytics.averageGrade}%</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Completion</p><p class="mt-1 text-3xl font-bold text-blue-400">${analytics.completion}%</p></div>
              </div>
            </div>
          </section>

          <div class="grid gap-6 xl:grid-cols-[1.4fr_1fr]">
            <div class="space-y-6">
              <!-- Pending submissions -->
              <div class="metric-card">
                <div class="mb-4 flex items-center justify-between">
                  <div><h2 class="text-base font-semibold text-text-primary">Submissions Awaiting Grades</h2>
                  <p class="text-sm text-text-secondary">Students waiting on feedback.</p></div>
                  <a href="grading.html" class="text-sm font-medium text-primary hover:underline">SpeedGrader</a>
                </div>
                ${pendingSubs.length === 0
                  ? '<div class="rounded-2xl border border-emerald-500/20 bg-emerald-500/10 p-5 text-center text-sm text-emerald-300">Grading queue clear!</div>'
                  : pendingSubs.map(sub => {
                      const a = state.assignments.find(x => x.id === sub.assignmentId);
                      const student = state.users.find(u => u.id === sub.studentId);
                      const dt = new Date(sub.submittedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
                      return `<a href="grading.html" class="flex items-start justify-between gap-3 rounded-2xl border border-amber-500/20 bg-amber-500/5 p-4 mb-2 hover:bg-amber-500/10">
                        <div class="flex items-center gap-3">
                          <img src="${student?.avatar ?? ''}" alt="${escHtml(student?.name ?? '')}" class="h-9 w-9 rounded-xl object-cover" />
                          <div><p class="text-sm font-semibold text-text-primary">${escHtml(student?.name ?? 'Student')}</p>
                          <p class="text-xs text-text-secondary">${escHtml(a?.title ?? 'Assignment')}</p></div>
                        </div>
                        <div class="text-right shrink-0"><p class="text-xs text-text-muted">Submitted ${dt}</p>
                        <p class="mt-1 text-xs font-semibold text-amber-400">Needs grading</p></div>
                      </a>`;
                    }).join('')
                }
              </div>

              <!-- Classes -->
              <div class="metric-card">
                <div class="mb-4 flex items-center justify-between">
                  <h2 class="text-base font-semibold text-text-primary">My Classes</h2>
                  <a href="classes.html" class="text-sm font-medium text-primary hover:underline">Manage</a>
                </div>
                <div class="space-y-3">
                  ${myClasses.slice(0, 4).map(c => `
                    <a href="class-detail.html?id=${c.id}" class="block rounded-2xl border border-[var(--app-border-subtle)] bg-white/5 p-4 hover:border-blue-500/40 hover:bg-white/10">
                      <div class="flex items-start justify-between gap-3">
                        <div class="flex items-start gap-3">
                          <div class="mt-1 h-3 w-3 shrink-0 rounded-full" style="background:${c.color}"></div>
                          <div><p class="text-sm font-semibold text-text-primary">${escHtml(c.title)}</p>
                          <p class="text-xs text-text-secondary">${escHtml(c.subject)} · ${escHtml(c.section)}</p></div>
                        </div>
                        <div class="text-right text-xs shrink-0">
                          <p class="font-semibold text-text-primary">${c.enrolledStudentIds.length} learner${c.enrolledStudentIds.length !== 1 ? 's' : ''}</p>
                          <p class="text-text-muted">Code: ${escHtml(c.code)}</p>
                        </div>
                      </div>
                      <div class="mt-3">${progressBar(c.progress)}</div>
                    </a>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <!-- Quick create assignment -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-1">Quick Create Assignment</h2>
                <p class="text-sm text-text-secondary mb-4">Post a new assignment instantly.</p>
                <form id="quick-assignment-form" class="space-y-3">
                  <input id="qa-title" class="form-input" placeholder="Assignment title" required />
                  <select id="qa-class" class="form-input">
                    ${state.classes.map(c => `<option value="${c.id}">${escHtml(c.title)}</option>`).join('')}
                  </select>
                  <input id="qa-due" class="form-input" placeholder="Due date (e.g. May 20)" />
                  <button type="submit" class="btn-primary w-full py-2.5 text-sm">
                    <span class="material-symbols-outlined text-[16px]">add</span> Create Assignment
                  </button>
                </form>
              </div>

              <!-- Upcoming classes -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-1">Upcoming Classes</h2>
                <p class="text-sm text-text-secondary mb-4">Scheduled sessions this week.</p>
                ${upcomingClasses.length === 0
                  ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-4">No upcoming classes.</p>'
                  : upcomingClasses.map(ev => `
                    <a href="calendar.html" class="block rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3 mb-2 hover:bg-white/10">
                      <div class="flex items-center justify-between gap-2">
                        <div><p class="text-sm font-semibold text-text-primary">${escHtml(ev.title)}</p>
                        <p class="text-xs text-text-muted mt-0.5">${escHtml(ev.date)} · ${escHtml(ev.startTime)}–${escHtml(ev.endTime)}</p></div>
                        <span class="material-symbols-outlined text-emerald-400 text-[18px]">calendar_today</span>
                      </div>
                    </a>
                  `).join('')
                }
              </div>

              <!-- Notifications -->
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-4">Notifications</h2>
                ${notifs.length === 0
                  ? '<p class="text-sm text-text-secondary bg-black/10 rounded-xl p-4">No new notifications.</p>'
                  : notifs.map(n => `<div class="rounded-xl border border-[var(--app-border-subtle)] ${n.unread ? 'bg-blue-500/10' : 'bg-white/5'} p-3 mb-2">
                      <p class="text-sm font-semibold text-text-primary">${escHtml(n.title)}</p>
                      <p class="text-xs text-text-secondary">${escHtml(n.description)}</p>
                    </div>`).join('')
                }
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('quick-assignment-form')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('qa-title').value.trim();
        if (!title) return;
        createAssignment({
          title,
          classId: document.getElementById('qa-class').value,
          kind: 'assignment',
          dueDate: document.getElementById('qa-due').value,
          maxPoints: 100,
          description: '',
        });
        document.getElementById('qa-title').value = '';
        document.getElementById('qa-due').value = '';
        showToast('Assignment created!', 'success');
      });
    }

    // ── Admin Dashboard ────────────────────────────────────────────────
    function renderAdmin() {
      const state = getState();
      const user = getCurrentUser();
      if (!user) return;
      const analytics = analyticsByRole.admin;
      const totalUsers = state.users.length;
      const students = state.users.filter(u => u.role === 'student').length;
      const teachers = state.users.filter(u => u.role === 'teacher').length;
      const admins = state.users.filter(u => u.role === 'admin').length;
      const activeClasses = state.classes.filter(c => !c.archived).length;
      const archivedClasses = state.classes.filter(c => c.archived).length;
      const totalSubs = state.submissions.length;
      const pendingSubs = state.submissions.filter(s => s.score === undefined).length;
      const recentUsers = [...state.users].reverse().slice(0, 5);

      document.getElementById('page-content').innerHTML = `
        <div class="space-y-7">
          <section class="overflow-hidden rounded-3xl border border-white/10 p-7 sm:p-10"
            style="background:linear-gradient(135deg,rgba(124,58,237,.22),rgba(37,99,235,.12),rgba(239,68,68,.06))">
            <div class="flex flex-col gap-6 xl:flex-row xl:items-center xl:justify-between">
              <div class="space-y-3">
                <div class="inline-flex items-center gap-2 rounded-full border border-purple-400/20 bg-purple-500/10 px-3 py-1 text-xs uppercase tracking-widest text-purple-300">
                  <span class="material-symbols-outlined text-[14px]">shield</span> Administrator Portal
                </div>
                <h1 class="text-4xl font-semibold text-white sm:text-5xl">Platform Overview</h1>
                <p class="max-w-xl text-lg text-white/70">
                  <strong class="text-white">${totalUsers} users</strong> across
                  <strong class="text-purple-300">${activeClasses} active classes</strong>. Platform operating normally.
                </p>
                <div class="flex flex-wrap gap-3 pt-1">
                  <a href="admin.html" class="inline-flex items-center gap-2 rounded-2xl bg-purple-600 px-5 py-2.5 text-sm font-semibold text-white hover:brightness-110">
                    <span class="material-symbols-outlined text-[16px]">group</span> Manage Users
                  </a>
                  <a href="analytics.html" class="inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-5 py-2.5 text-sm font-semibold text-white hover:bg-white/10">
                    <span class="material-symbols-outlined text-[16px]">bar_chart</span> Analytics
                  </a>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-3 xl:min-w-[260px]">
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Total Users</p><p class="mt-1 text-3xl font-bold text-white">${totalUsers}</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Active Classes</p><p class="mt-1 text-3xl font-bold text-purple-400">${activeClasses}</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Pending Subs</p><p class="mt-1 text-3xl font-bold text-amber-400">${pendingSubs}</p></div>
                <div class="metric-card text-center"><p class="text-xs uppercase tracking-widest text-text-muted">Engagement</p><p class="mt-1 text-3xl font-bold text-emerald-400">${analytics.engagement}%</p></div>
              </div>
            </div>
          </section>

          <div class="grid gap-6 xl:grid-cols-[1.3fr_1fr]">
            <div class="space-y-6">
              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-1">User Distribution</h2>
                <p class="text-sm text-text-secondary mb-4">Breakdown by role.</p>
                <div class="space-y-4">
                  ${[['Students', students, 'bg-blue-500', 'text-blue-400'],
                     ['Teachers', teachers, 'bg-emerald-500', 'text-emerald-400'],
                     ['Admins', admins, 'bg-purple-500', 'text-purple-400']].map(([label, count, bg, tc]) => `
                    <div>
                      <div class="mb-2 flex items-center justify-between">
                        <span class="text-sm text-text-secondary">${label}</span>
                        <span class="text-sm font-bold ${tc}">${count} <span class="text-text-muted font-normal">(${Math.round(count/totalUsers*100)}%)</span></span>
                      </div>
                      <div class="h-2.5 w-full overflow-hidden rounded-full bg-white/5">
                        <div class="h-full rounded-full ${bg}" style="width:${(count/totalUsers*100).toFixed(1)}%"></div>
                      </div>
                    </div>
                  `).join('')}
                </div>
                <div class="mt-5 grid grid-cols-3 gap-3">
                  <div class="rounded-2xl border border-[var(--app-border-subtle)] bg-blue-500/10 p-3 text-center"><p class="text-2xl font-bold text-blue-400">${students}</p><p class="text-xs text-text-muted">Students</p></div>
                  <div class="rounded-2xl border border-[var(--app-border-subtle)] bg-emerald-500/10 p-3 text-center"><p class="text-2xl font-bold text-emerald-400">${teachers}</p><p class="text-xs text-text-muted">Teachers</p></div>
                  <div class="rounded-2xl border border-[var(--app-border-subtle)] bg-purple-500/10 p-3 text-center"><p class="text-2xl font-bold text-purple-400">${admins}</p><p class="text-xs text-text-muted">Admins</p></div>
                </div>
              </div>

              <div class="metric-card">
                <h2 class="text-base font-semibold text-text-primary mb-4">Platform Activity</h2>
                <div class="grid grid-cols-2 gap-3">
                  ${[['Classes', state.classes.length, `${activeClasses} active`],
                     ['Assignments', state.assignments.length, 'Across all classes'],
                     ['Submissions', totalSubs, `${pendingSubs} pending`],
                     ['Resources', state.resources.length, 'Files and links'],
                     ['Discussions', state.discussions.length, 'Active threads'],
                     ['Events', state.events.length, 'Scheduled']].map(([label, val, sub]) => `
                    <div class="rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-4">
                      <p class="text-xs uppercase tracking-widest text-text-muted">${label}</p>
                      <p class="mt-1 text-2xl font-bold text-text-primary">${val}</p>
                      <p class="text-xs text-text-secondary">${sub}</p>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="space-y-6">
              <div class="metric-card">
                <div class="mb-4 flex items-center justify-between">
                  <h2 class="text-base font-semibold text-text-primary">Registered Users</h2>
                  <a href="admin.html" class="text-sm font-medium text-primary hover:underline">Manage all</a>
                </div>
                <div class="space-y-3">
                  ${recentUsers.map(u => `
                    <div class="flex items-center gap-3 rounded-xl border border-[var(--app-border-subtle)] bg-white/5 p-3">
                      <img src="${u.avatar}" alt="${escHtml(u.name)}" class="h-10 w-10 rounded-xl object-cover" />
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-text-primary truncate">${escHtml(u.name)}</p>
                        <p class="text-xs text-text-muted truncate">${escHtml(u.email)}</p>
                      </div>
                      <span class="badge ${u.role === 'admin' ? 'role-admin' : u.role === 'teacher' ? 'role-teacher' : 'role-student'} shrink-0">${u.role}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
